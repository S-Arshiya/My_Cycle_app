<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cycle 🖤</title>
<link rel="apple-touch-icon" href="icon.png">
  
<style>
body {
  font-family: -apple-system;
  background: #0f0f14;
  color: white;
  text-align: center;
}

h1 { color: #ff4d6d; }

.header {
  display: flex;
  justify-content: space-between;
  max-width: 400px;
  margin: auto;
  align-items: center;
}

button {
  background: #ff4d6d;
  border: none;
  padding: 8px 12px;
  border-radius: 10px;
  color: white;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  max-width: 400px;
  margin: 15px auto;
}

.day {
  padding: 12px;
  border-radius: 10px;
  background: #1c1c25;
  transition: 0.2s;
}

.day:hover { transform: scale(1.1); }

.period { background: #ff4d6d; }
.predicted { background: #6c5ce7; }
.ovulation { background: #00b894; }

.card {
  background: #1c1c25;
  padding: 15px;
  border-radius: 12px;
  max-width: 400px;
  margin: 15px auto;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<h1>🖤 My Cycle</h1>

<div class="header">
  <button onclick="changeMonth(-1)">⬅️</button>
  <h3 id="monthLabel"></h3>
  <button onclick="changeMonth(1)">➡️</button>
</div>

<div class="calendar" id="calendar"></div>

<div class="card">
  <input type="date" id="startDate">
  <input type="date" id="endDate">
  <button onclick="saveData()">Save</button>
</div>

<div class="card" id="prediction"></div>

<script>

let currentDate = new Date();

function getData() {
  return JSON.parse(localStorage.getItem("cycleData")) || [];
}

function saveData() {
  let start = document.getElementById("startDate").value;
  let end = document.getElementById("endDate").value;

  let data = getData();
  data.push({ start, end });

  localStorage.setItem("cycleData", JSON.stringify(data));

  renderCalendar();
}

function getAvgCycle(data) {
  if (data.length < 2) return 28;

  let diffs = [];
  for (let i=1;i<data.length;i++) {
    let d1=new Date(data[i-1].start);
    let d2=new Date(data[i].start);
    diffs.push((d2-d1)/(1000*60*60*24));
  }

  return Math.round(diffs.reduce((a,b)=>a+b)/diffs.length);
}

function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth()+dir);
  renderCalendar();
}

function renderCalendar() {
  let cal=document.getElementById("calendar");
  cal.innerHTML="";

  let year=currentDate.getFullYear();
  let month=currentDate.getMonth();

  document.getElementById("monthLabel").innerText =
    currentDate.toLocaleString('default',{month:'long',year:'numeric'});

  let firstDay=new Date(year,month,1).getDay();
  let days=new Date(year,month+1,0).getDate();

  let data=getData();
  let avg=getAvgCycle(data);

  let last=data.length?new Date(data[data.length-1].start):null;

  let predicted=last?new Date(last.getTime()+avg*86400000):null;
  let ovu=last?new Date(last.getTime()+(avg-14)*86400000):null;

  for(let i=0;i<firstDay;i++) cal.innerHTML+="<div></div>";

  for(let d=1;d<=days;d++) {
    let date=new Date(year,month,d);
    let cls="day";

    data.forEach(e=>{
      let s=new Date(e.start);
      let en=e.end?new Date(e.end):s;
      if(date>=s && date<=en) cls+=" period";
    });

    if(predicted && date.toDateString()===predicted.toDateString()) cls+=" predicted";
    if(ovu && date.toDateString()===ovu.toDateString()) cls+=" ovulation";

    cal.innerHTML+=`<div class="${cls}" onclick="selectDate('${date.toISOString()}')">${d}</div>`;
  }

  updatePrediction(predicted,ovu,avg);
}

function selectDate(dateStr) {
  let d=dateStr.split("T")[0];
  document.getElementById("startDate").value=d;
}

function updatePrediction(p,o,avg) {
  if(!p) return;
  document.getElementById("prediction").innerHTML=
    `Avg Cycle: ${avg} days<br>
     Next: ${p.toDateString()}<br>
     Ovulation: ${o.toDateString()}`;
}

renderCalendar();

</script>

</body>
</html>
