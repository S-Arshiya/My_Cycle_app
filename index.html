<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cycle 🖤</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
body {
  font-family: -apple-system;
  background: #0f0f14;
  color: white;
  text-align: center;
}

h1 { color: #ff4d6d; }

.header {
  display: flex;
  justify-content: space-between;
  max-width: 400px;
  margin: auto;
}

.header button {
  width: 80px;
  background: #ff4d6d;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  max-width: 400px;
  margin: 20px auto;
}

.day {
  padding: 12px;
  border-radius: 10px;
  background: #1c1c25;
  cursor: pointer;
}

.selected {
  outline: 2px solid white;
}

.period { background: #ff4d6d; }
.end-day { background: #00c853; }
.ovulation { background: #0984e3; }

.card {
  background: #1c1c25;
  padding: 15px;
  border-radius: 12px;
  max-width: 400px;
  margin: 15px auto;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
}

button {
  background: #ff4d6d;
  color: white;
}
</style>
</head>

<body>

<h1>🖤 My Cycle</h1>

<div class="header">
  <button onclick="changeMonth(-1)">⬅️</button>
  <h3 id="monthLabel"></h3>
  <button onclick="changeMonth(1)">➡️</button>
</div>

<div class="calendar" id="calendar"></div>

<div class="card">
  <input type="date" id="startDate">
  <button id="saveBtn" onclick="saveData()">Save</button>
</div>

<div class="card" id="prediction"></div>

<script>

let currentDate = new Date();
let editingIndex = null;
let selectedDate = null;

function getData() {
  return JSON.parse(localStorage.getItem("cycleData")) || [];
}

function saveData() {
  let start = document.getElementById("startDate").value;
  if (!start) return;

  let data = getData();

  if (editingIndex !== null) {
    data[editingIndex].start = start;
    editingIndex = null;
  } else {
    data.push({ start });
  }

  localStorage.setItem("cycleData", JSON.stringify(data));

  document.getElementById("saveBtn").innerText = "Save";
  renderCalendar();
}

/* month navigation */
function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth()+dir);
  renderCalendar();
}

/* calendar */
function renderCalendar() {
  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let year = currentDate.getFullYear();
  let month = currentDate.getMonth();

  document.getElementById("monthLabel").innerText =
    currentDate.toLocaleString('default',{month:'long',year:'numeric'});

  // ✅ FIXED: local date (NO UTC)
  let minDate = `${year}-${String(month+1).padStart(2,'0')}-01`;
  let maxDate = `${year}-${String(month+1).padStart(2,'0')}-${new Date(year, month+1, 0).getDate()}`;

  document.getElementById("startDate").min = minDate;
  document.getElementById("startDate").max = maxDate;

  let firstDay = new Date(year, month, 1).getDay();
  let days = new Date(year, month+1, 0).getDate();

  let data = getData();

  // sort data
  data.sort((a,b)=> new Date(a.start) - new Date(b.start));

  let avg = 28;
  if (data.length > 1) {
    let diffs = [];
    for (let i=1;i<data.length;i++) {
      let d1=new Date(data[i-1].start);
      let d2=new Date(data[i].start);
      diffs.push((d2-d1)/(1000*60*60*24));
    }
    avg = Math.round(diffs.reduce((a,b)=>a+b)/diffs.length);
  }

  let last = data.length ? new Date(data[data.length-1].start) : null;
  let ovulation = last ? new Date(last.getTime()+(avg-14)*86400000) : null;

  for (let i=0;i<firstDay;i++) cal.innerHTML += "<div></div>";

  for (let d=1; d<=days; d++) {
    let date = new Date(year, month, d);
    let cls = "day";

    data.forEach((entry)=>{
      let start = new Date(entry.start);

      for(let i=0;i<7;i++){
        let temp = new Date(start);
        temp.setDate(temp.getDate()+i);

        if(date.toDateString()===temp.toDateString()){
          cls += " period";
        }

        if(i===6 && date.toDateString()===temp.toDateString()){
          cls += " end-day";
        }
      }
    });

    if(ovulation && date.toDateString()===ovulation.toDateString()){
      cls += " ovulation";
    }

    let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    if(selectedDate === dateStr){
      cls += " selected";
    }

    cal.innerHTML += `<div class="${cls}" onclick="handleClick('${dateStr}')">${d}</div>`;
  }

  updatePrediction(last,avg,ovulation);
}

/* click */
function handleClick(dateStr){
  selectedDate = dateStr;

  let data = getData();
  let index = data.findIndex(e => e.start === dateStr);

  document.getElementById("startDate").value = dateStr;

  if(index !== -1){
    editingIndex = index;
    document.getElementById("saveBtn").innerText = "Update";
  } else {
    editingIndex = null;
    document.getElementById("saveBtn").innerText = "Save";
  }

  renderCalendar();
}

/* prediction */
function updatePrediction(last,avg,ovulation){
  if(!last) return;

  let next = new Date(last);
  next.setDate(next.getDate()+avg);

  document.getElementById("prediction").innerHTML =
    `Avg Cycle: ${avg} days<br>
     Next: ${next.toDateString()}<br>
     Ovulation: ${ovulation.toDateString()}`;
}

renderCalendar();

</script>

</body>
</html>
